spring:
  application:
    name: coupon-discount-engine

  # ---- Default profile: in-memory H2 for local dev / demo / tests ----
  datasource:
    url: jdbc:h2:mem:coupondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  # Run data.sql AFTER Hibernate creates the schema (ddl-auto), not before.
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Avoid the classic N+1 pattern for default *ToOne fetches by batching.
        default_batch_fetch_size: 25
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
      # How long (ms) a transaction will wait to acquire a pessimistic lock
      # before giving up. Keeps a request from hanging indefinitely under
      # contention; the resulting PessimisticLockingFailureException is
      # mapped to HTTP 409 by GlobalExceptionHandler.
      jakarta.persistence.lock.timeout: 3000

  # Connection pool sized for "high concurrent requests" per the assignment.
  # Tune based on real load testing / DB capacity.
  datasource-hikari:
    maximum-pool-size: 20

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.hibernate.SQL: debug
    com.example.couponengine: info

---
# ---- Production profile: point at a real MySQL instance ----
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:coupondb}?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:coupon_app}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
