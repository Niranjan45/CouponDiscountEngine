# ===================================================================
# DEFAULT PROFILE: In-Memory H2 for local dev / demo / tests
# ===================================================================
spring.application.name=coupon-discount-engine





# JPA and Hibernate configuration
# Run data.sql AFTER Hibernate creates the schema (ddl-auto), not before.
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate optimization properties
spring.jpa.properties.hibernate.format_sql=true
# Avoid the classic N+1 pattern for default *ToOne fetches by batching.
spring.jpa.properties.hibernate.default_batch_fetch_size=25
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# How long (ms) a transaction will wait to acquire a pessimistic lock
# before giving up. Keeps a request from hanging indefinitely under
# contention; the resulting PessimisticLockingFailureException is
# mapped to HTTP 409 by GlobalExceptionHandler.
spring.jpa.properties.jakarta.persistence.lock.timeout=3000

# Connection pool sized for "high concurrent requests" per the assignment.
# Tune based on real load testing / DB capacity.
spring.datasource-hikari.maximum-pool-size=20

# Server Port
server.port=8081

# Actuator Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Logging Configuration
logging.level.org.hibernate.SQL=debug
://level.com.example.couponengine=info

# ===================================================================
# PRODUCTION PROFILE: Point at a real MySQL instance
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/coupon_Db
spring.datasource.username=root
spring.datasource.password=Niranjan@45
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
